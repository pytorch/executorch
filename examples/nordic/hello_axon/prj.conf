# hello_axon — ExecuTorch + AXON NPU inference

# Console / UART
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y

# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_PRINTK=y
CONFIG_PRINTK=y

# Timing (for cycle counting)
CONFIG_TIMING_FUNCTIONS=y

# Float printing
CONFIG_PICOLIBC_IO_FLOAT=y

# Memory
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_MAIN_STACK_SIZE=16384

# C++ (required by ExecuTorch)
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# ExecuTorch
CONFIG_EXECUTORCH=y
CONFIG_EXECUTORCH_ENABLE_LOGGING=y
CONFIG_EXECUTORCH_BUILD_PORTABLE_OPS=n
CONFIG_EXECUTORCH_OPTIMIZE_FOR_SIZE=y
