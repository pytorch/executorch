name: Test CoreML Backend

on:
  schedule:
    - cron: 0 2 * * *
  push:
    branches:
      - main
      - release/*
    tags:
      - ciflow/nightly/*
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}--${{ github.event.pull_request.number || github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

jobs:
  # Lists files changed in the triggering pull_request via gh api. For
  # non-PR events (push, schedule, workflow_dispatch, tag) the reusable
  # emits '*' so any `contains(...)` check below evaluates false; the
  # `event_name != 'pull_request'` short-circuit in test-coreml's `if:`
  # is what allows non-PR events through unconditionally. The workflow
  # always shows on HUD; only the heavy test job is gated on PR paths.
  changed-files:
    name: Get changed files
    uses: ./.github/workflows/_get-changed-files.yml

  test-coreml:
    needs: changed-files
    # Path-gated. Calls _test_backend.yml which on macOS runs:
    #   - .ci/scripts/test_backend.sh "${suite}" "${flow}"
    #     (suites: models, operators; flows: coreml, coreml_static_int8)
    #   - .ci/scripts/setup-macos.sh --build-tool cmake --editable true
    #   - pytest backends/test/suite/${SUITE}/ -m "flow_${FLOW}"
    # Test exercises:
    #   - backends/apple/coreml/** (compiler, partition, quantizer, runtime)
    #   - backends/test/suite/** (the pytest framework + flow registration)
    #   - .ci/scripts/{test_backend,setup-macos}.sh
    # Workflow self-edits (this file or _test_backend.yml) trigger the job.
    if: |
      github.event_name != 'pull_request' ||
      contains(needs.changed-files.outputs.changed-files, 'backends/apple/coreml') ||
      contains(needs.changed-files.outputs.changed-files, 'backends/test/suite') ||
      contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test_backend.sh') ||
      contains(needs.changed-files.outputs.changed-files, '.ci/scripts/setup-macos.sh') ||
      contains(needs.changed-files.outputs.changed-files, '.github/workflows/test-backend-coreml.yml') ||
      contains(needs.changed-files.outputs.changed-files, '.github/workflows/_test_backend.yml')
    uses: ./.github/workflows/_test_backend.yml
    with:
      backend: coreml
      flows: >-
        ${{ github.event_name == 'pull_request'
            && '["coreml"]'
            || '["coreml", "coreml_static_int8"]' }}
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      timeout: 120
      run-macos: true
