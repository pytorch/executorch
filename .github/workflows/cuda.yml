# Test ExecuTorch CUDA Build Compatibility
# This workflow tests whether ExecuTorch can be successfully built with CUDA support
# across different CUDA versions (12.6, 13.0) using the command:
#   ./install_executorch.sh
#
# Note: ExecuTorch automatically detects the system CUDA version using nvcc and
# installs the appropriate PyTorch wheel. No manual CUDA/PyTorch installation needed.

name: Test CUDA Builds

on:
  push:
    branches:
      - main
      - release/*
    tags:
      - ciflow/cuda/*
  pull_request:
    paths:
      - .github/workflows/cuda.yml
      - backends/cuda/**
      - backends/aoti/**
      - .ci/scripts/test-cuda-build.sh
      - .ci/scripts/export_model_artifact.sh
      - .ci/scripts/test_model_e2e.sh
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}-${{ github.event_name == 'workflow_dispatch' }}-${{ github.event_name == 'schedule' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changed-files:
    name: Get changed files
    uses: ./.github/workflows/_get-changed-files.yml
    with:
      include-push-diff: true

  run-decision:
    name: CI run decision
    uses: ./.github/workflows/_ci-run-decision.yml

  test-cuda-builds:
    needs: [changed-files, run-decision]
    # Path-filtered: mirrors the workflow-level pull_request `paths:`
    # filter so push commits that don't touch CUDA-relevant paths skip
    # this job on non-sampled commits.
    if: |
      contains(needs.changed-files.outputs.changed-files, 'backends/cuda') ||
      contains(needs.changed-files.outputs.changed-files, 'backends/aoti') ||
      contains(needs.changed-files.outputs.changed-files, '.github/workflows/cuda.yml') ||
      contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test-cuda-build.sh') ||
      contains(needs.changed-files.outputs.changed-files, '.ci/scripts/export_model_artifact.sh') ||
      contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test_model_e2e.sh') ||
      needs.run-decision.outputs.is-full-run == 'true'
    strategy:
      fail-fast: false
      matrix:
        cuda-version: ["12.6", "13.0"]

    name: test-executorch-cuda-build-${{ matrix.cuda-version }}
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      timeout: 90
      runner: linux.g5.4xlarge.nvidia.gpu
      gpu-arch-type: cuda
      gpu-arch-version: ${{ matrix.cuda-version }}
      use-custom-docker-registry: false
      submodules: recursive
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      script: |
        set -eux

        # Test ExecuTorch CUDA build - ExecuTorch will automatically detect CUDA version
        # and install the appropriate PyTorch wheel
        source .ci/scripts/test-cuda-build.sh "${{ matrix.cuda-version }}"

  # This job will fail if any of the CUDA versions fail
  check-all-cuda-builds:
    needs: [changed-files, run-decision, test-cuda-builds]
    runs-on: ubuntu-latest
    # Run only if the test-cuda-builds matrix actually ran (i.e. the same
    # path/sample gate as test-cuda-builds itself). Otherwise this job
    # would fire on every commit and fail because needs.result == 'skipped'.
    if: |
      always() &&
      (
        contains(needs.changed-files.outputs.changed-files, 'backends/cuda') ||
        contains(needs.changed-files.outputs.changed-files, 'backends/aoti') ||
        contains(needs.changed-files.outputs.changed-files, '.github/workflows/cuda.yml') ||
        contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test-cuda-build.sh') ||
        contains(needs.changed-files.outputs.changed-files, '.ci/scripts/export_model_artifact.sh') ||
        contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test_model_e2e.sh') ||
        needs.run-decision.outputs.is-full-run == 'true'
      )
    steps:
      - name: Check if all CUDA builds succeeded
        run: |
          if [[ "${{ needs.test-cuda-builds.result }}" != "success" ]]; then
            echo "ERROR: One or more ExecuTorch CUDA builds failed!"
            echo "CUDA build results: ${{ needs.test-cuda-builds.result }}"
            exit 1
          else
            echo "SUCCESS: All ExecuTorch CUDA builds (12.6, 13.0) completed successfully!"
          fi

  test-models-cuda:
    name: test-models-cuda
    needs: [changed-files, run-decision]
    if: |
      contains(needs.changed-files.outputs.changed-files, 'backends/cuda') ||
      contains(needs.changed-files.outputs.changed-files, 'backends/aoti') ||
      contains(needs.changed-files.outputs.changed-files, '.github/workflows/cuda.yml') ||
      contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test-cuda-build.sh') ||
      contains(needs.changed-files.outputs.changed-files, '.ci/scripts/export_model_artifact.sh') ||
      contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test_model_e2e.sh') ||
      needs.run-decision.outputs.is-full-run == 'true'
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      timeout: 90
      runner: linux.g5.4xlarge.nvidia.gpu
      gpu-arch-type: cuda
      gpu-arch-version: "13.0"
      use-custom-docker-registry: false
      submodules: recursive
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      script: |
        set -eux

        PYTHON_EXECUTABLE=python ./install_executorch.sh
        export LD_LIBRARY_PATH=/opt/conda/lib:$LD_LIBRARY_PATH

        # Build executor_runner with CUDA support once, then reuse for all models.
        # test_model.sh's build_cmake_executor_runner does rm -rf cmake-out on each
        # invocation, so we build separately and run models directly.
        cmake -DCMAKE_BUILD_TYPE=Release \
            -DEXECUTORCH_BUILD_CUDA=ON \
            -DEXECUTORCH_BUILD_EXTENSION_TENSOR=ON \
            -DPYTHON_EXECUTABLE=python \
            -Bcmake-out .
        cmake --build cmake-out -j4

        for model in linear add add_mul resnet18 conv1d sdpa mv2 mv3; do
          python -m examples.cuda.scripts.export --model_name="$model" --output_dir "./"
          ./cmake-out/executor_runner --model_path "./${model}.pte" --data_path "./aoti_cuda_blob.ptd"
        done

  unittest-cuda:
    name: unittest-cuda
    needs: [changed-files, run-decision]
    if: |
      contains(needs.changed-files.outputs.changed-files, 'backends/cuda') ||
      contains(needs.changed-files.outputs.changed-files, 'backends/aoti') ||
      contains(needs.changed-files.outputs.changed-files, '.github/workflows/cuda.yml') ||
      contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test-cuda-build.sh') ||
      contains(needs.changed-files.outputs.changed-files, '.ci/scripts/export_model_artifact.sh') ||
      contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test_model_e2e.sh') ||
      needs.run-decision.outputs.is-full-run == 'true'
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      timeout: 90
      runner: linux.g5.4xlarge.nvidia.gpu
      gpu-arch-type: cuda
      gpu-arch-version: "13.0"
      use-custom-docker-registry: false
      submodules: recursive
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      script: |
        set -eux
        # Install executorch in editable mode so custom op libs land in-tree
        bash ./install_executorch.sh

        # The Triton-compiled .so files in the CUDA backend require GLIBCXX_3.4.29
        # which the default system libstdc++ doesn't have. Install a newer one.
        conda install -y -c conda-forge 'libstdcxx-ng>=12'
        export LD_LIBRARY_PATH=/opt/conda/lib:$LD_LIBRARY_PATH

        # Build ExecuTorch with CUDA support
        cmake --workflow --preset llm-release-cuda

        # Build and run CUDA shim tests (C++)
        pushd backends/cuda/runtime/shims/tests
        cmake --workflow --preset default
        popd

        # Install flash-linear-attention for chunk_gated_delta_rule triton kernel tests
        pip install "flash-linear-attention==0.4.2"

        # Build executor_runner (needed by CUDA backend e2e tests)
        cmake --build cmake-out --target executor_runner

        # Run CUDA backend Python tests
        python -m pytest backends/cuda/tests backends/cuda/passes/tests -v -o "addopts="

        # Run Qwen 3.5 MoE tests (quantize roundtrip + TurboQuant KV cache + sampler)
        python -m pytest examples/models/qwen3_5_moe/test_quantize_roundtrip.py examples/models/qwen3_5_moe/test_turboquant.py examples/models/qwen3_5_moe/test_sampler.py -v -o "addopts="

        # Run Gemma 4 31B tests (quant unit tests + pipeline integration tests)
        pip install gguf
        python -m pytest examples/models/gemma4_31b/quant/tests/ examples/models/gemma4_31b/tests/ --ignore=examples/models/gemma4_31b/tests/test_mlx_pipeline.py -v -o "addopts="

  export-model-cuda-artifact:
    name: export-model-cuda-artifact
    # Skip this job if the pull request is from a fork (HuggingFace secrets are not available).
    # Path-filtered on push: mirrors the workflow-level pull_request `paths:`
    # filter so push commits that don't touch CUDA-relevant paths skip
    # this job on non-sampled commits.
    needs: [changed-files, run-decision]
    if: |
      (github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request') &&
      (
        contains(needs.changed-files.outputs.changed-files, 'backends/cuda') ||
        contains(needs.changed-files.outputs.changed-files, 'backends/aoti') ||
        contains(needs.changed-files.outputs.changed-files, '.github/workflows/cuda.yml') ||
        contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test-cuda-build.sh') ||
        contains(needs.changed-files.outputs.changed-files, '.ci/scripts/export_model_artifact.sh') ||
        contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test_model_e2e.sh') ||
        needs.run-decision.outputs.is-full-run == 'true'
      )
    uses: pytorch/test-infra/.github/workflows/linux_job_v3.yml@main
    permissions:
      id-token: write
      contents: read
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        model:
          - repo: "mistralai"
            name: "Voxtral-Mini-3B-2507"
          - repo: "mistralai"
            name: "Voxtral-Mini-4B-Realtime-2602"
          - repo: "nvidia"
            name: "diar_streaming_sortformer_4spk-v2"
          - repo: "openai"
            name: "whisper-small"
          - repo: "openai"
            name: "whisper-large-v3-turbo"
          - repo: "google"
            name: "gemma-3-4b-it"
          - repo: "Qwen"
            name: "Qwen3-0.6B"
          - repo: "nvidia"
            name: "parakeet-tdt"
          - repo: "facebook"
            name: "dinov2-small-imagenet1k-1-layer"
          - repo: "SocialLocalMobile"
            name: "Qwen3.5-35B-A3B-HQQ-INT4"
          - repo: "SocialLocalMobile"
            name: "gemma-4-31B-it-HQQ-INT4"
        quant:
          - "non-quantized"
          - "quantized-int4-tile-packed"
          - "quantized-int4-weight-only"
        exclude:
          # TODO: enable int4-weight-only on gemma3.
          - model:
              repo: "google"
              name: "gemma-3-4b-it"
            quant: "quantized-int4-weight-only"
          # Qwen3.5 MoE uses a prequantized checkpoint, only tile-packed
          - model:
              repo: "SocialLocalMobile"
              name: "Qwen3.5-35B-A3B-HQQ-INT4"
            quant: "non-quantized"
          - model:
              repo: "SocialLocalMobile"
              name: "Qwen3.5-35B-A3B-HQQ-INT4"
            quant: "quantized-int4-weight-only"
          # Gemma 4 31B uses a prequantized checkpoint, only tile-packed
          - model:
              repo: "SocialLocalMobile"
              name: "gemma-4-31B-it-HQQ-INT4"
            quant: "non-quantized"
          - model:
              repo: "SocialLocalMobile"
              name: "gemma-4-31B-it-HQQ-INT4"
            quant: "quantized-int4-weight-only"
          # Voxtral Realtime only supports int4-tile-packed on CUDA
          - model:
              repo: "mistralai"
              name: "Voxtral-Mini-4B-Realtime-2602"
            quant: "non-quantized"
          - model:
              repo: "mistralai"
              name: "Voxtral-Mini-4B-Realtime-2602"
            quant: "quantized-int4-weight-only"
          # Sortformer currently supports only non-quantized export
          - model:
              repo: "nvidia"
              name: "diar_streaming_sortformer_4spk-v2"
            quant: "quantized-int4-tile-packed"
          - model:
              repo: "nvidia"
              name: "diar_streaming_sortformer_4spk-v2"
            quant: "quantized-int4-weight-only"
          # DINOv2 currently supports only non-quantized export
          - model:
              repo: "facebook"
              name: "dinov2-small-imagenet1k-1-layer"
            quant: "quantized-int4-tile-packed"
          - model:
              repo: "facebook"
              name: "dinov2-small-imagenet1k-1-layer"
            quant: "quantized-int4-weight-only"
          # Qwen3 int4-weight-only: no downstream job consumes this artifact
          - model:
              repo: "Qwen"
              name: "Qwen3-0.6B"
            quant: "quantized-int4-weight-only"
          - model:
              repo: "nvidia"
              name: "parakeet-tdt"
            quant: "quantized-int4-weight-only"
          # Whisper: cover all quant types and both sizes with minimal combos
          # whisper-small: non-quantized only
          # whisper-large-v3-turbo: int4-tile-packed + int4-weight-only
          - model:
              repo: "openai"
              name: "whisper-small"
            quant: "quantized-int4-tile-packed"
          - model:
              repo: "openai"
              name: "whisper-small"
            quant: "quantized-int4-weight-only"
          - model:
              repo: "openai"
              name: "whisper-large-v3-turbo"
            quant: "non-quantized"
    with:
      timeout: 150
      secrets-env: EXECUTORCH_HF_TOKEN
      runner: ${{ (matrix.model.name == 'Qwen3.5-35B-A3B-HQQ-INT4' || matrix.model.name == 'gemma-4-31B-it-HQQ-INT4') && 'mt-l-x86iavx512-11-125-a100' || 'mt-l-x86aavx2-29-113-a10g' }}
      gpu-arch-type: cuda
      gpu-arch-version: "13.0"
      use-custom-docker-registry: false
      submodules: recursive
      upload-artifact: ${{ matrix.model.repo }}-${{ matrix.model.name }}-cuda-${{ matrix.quant }}
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      script: |
        set -eux

        echo "::group::Setup ExecuTorch"
        # OSDC runners can't reach the public PyPI CDN that download.pytorch.org's
        # transitive deps resolve to. Pre-install torch's pure-python deps from the
        # in-cluster pypi-cache and drop the default cpu extra-index so the cuda
        # torch wheel is the only candidate.
        export PIP_EXTRA_INDEX_URL=
        pip install filelock typing-extensions "setuptools<82" sympy networkx jinja2 fsspec numpy pillow
        # Disable MKL to avoid duplicate target error when conda has multiple MKL installations
        export USE_MKL=OFF
        ./install_executorch.sh
        echo "::endgroup::"

        # Setup Huggingface only for models that need it (not parakeet or dinov2)
        if [ "${{ matrix.model.name }}" != "parakeet-tdt" ] && [ "${{ matrix.model.name }}" != "dinov2-small-imagenet1k-1-layer" ]; then
          echo "::group::Setup Huggingface"
          pip install -U "huggingface_hub[cli]>=1.2.1,<2.0" accelerate "optimum~=2.0.0" "transformers==5.0.0rc1"
          HF_AUTH_TOKEN="$(printf '%s' "$SECRET_EXECUTORCH_HF_TOKEN" | tr -d '\r\n')"
          hf auth login --token "$HF_AUTH_TOKEN"
          OPTIMUM_ET_VERSION=$(cat .ci/docker/ci_commit_pins/optimum-executorch.txt)
          pip install --no-deps git+https://github.com/huggingface/optimum-executorch.git@${OPTIMUM_ET_VERSION}
          echo "::endgroup::"
        fi

        source .ci/scripts/export_model_artifact.sh cuda "${{ matrix.model.repo }}/${{ matrix.model.name }}" "${{ matrix.quant }}" "${RUNNER_ARTIFACT_DIR}"

  test-model-cuda-e2e:
    name: test-model-cuda-e2e
    # Same path filter as export-model-cuda-artifact above. Also explicitly
    # gated on the export job succeeding — when needs: jobs are *skipped*
    # (e.g. fork PR), GitHub still evaluates this if:, so without the
    # explicit success-check this job would run and then fail trying
    # to download an artifact that was never produced.
    needs: [changed-files, export-model-cuda-artifact, run-decision]
    if: |
      needs.export-model-cuda-artifact.result == 'success' &&
      (
        contains(needs.changed-files.outputs.changed-files, 'backends/cuda') ||
        contains(needs.changed-files.outputs.changed-files, 'backends/aoti') ||
        contains(needs.changed-files.outputs.changed-files, '.github/workflows/cuda.yml') ||
        contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test-cuda-build.sh') ||
        contains(needs.changed-files.outputs.changed-files, '.ci/scripts/export_model_artifact.sh') ||
        contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test_model_e2e.sh') ||
        needs.run-decision.outputs.is-full-run == 'true'
      )
    uses: pytorch/test-infra/.github/workflows/linux_job_v3.yml@main
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        model:
          - repo: "mistralai"
            name: "Voxtral-Mini-3B-2507"
          - repo: "mistralai"
            name: "Voxtral-Mini-4B-Realtime-2602"
          - repo: "nvidia"
            name: "diar_streaming_sortformer_4spk-v2"
          - repo: "openai"
            name: "whisper-small"
          - repo: "openai"
            name: "whisper-large-v3-turbo"
          - repo: "google"
            name: "gemma-3-4b-it"
          - repo: "nvidia"
            name: "parakeet-tdt"
          - repo: "facebook"
            name: "dinov2-small-imagenet1k-1-layer"
          - repo: "SocialLocalMobile"
            name: "Qwen3.5-35B-A3B-HQQ-INT4"
          - repo: "SocialLocalMobile"
            name: "gemma-4-31B-it-HQQ-INT4"
        quant:
          - "non-quantized"
          - "quantized-int4-tile-packed"
          - "quantized-int4-weight-only"
        exclude:
          # TODO: enable int4-weight-only on gemma3.
          - model:
              repo: "google"
              name: "gemma-3-4b-it"
            quant: "quantized-int4-weight-only"
          # Qwen3.5 MoE uses a prequantized checkpoint, only tile-packed
          - model:
              repo: "SocialLocalMobile"
              name: "Qwen3.5-35B-A3B-HQQ-INT4"
            quant: "non-quantized"
          - model:
              repo: "SocialLocalMobile"
              name: "Qwen3.5-35B-A3B-HQQ-INT4"
            quant: "quantized-int4-weight-only"
          # Gemma 4 31B uses a prequantized checkpoint, only tile-packed
          - model:
              repo: "SocialLocalMobile"
              name: "gemma-4-31B-it-HQQ-INT4"
            quant: "non-quantized"
          - model:
              repo: "SocialLocalMobile"
              name: "gemma-4-31B-it-HQQ-INT4"
            quant: "quantized-int4-weight-only"
          # Voxtral Realtime only supports int4-tile-packed on CUDA
          - model:
              repo: "mistralai"
              name: "Voxtral-Mini-4B-Realtime-2602"
            quant: "non-quantized"
          - model:
              repo: "mistralai"
              name: "Voxtral-Mini-4B-Realtime-2602"
            quant: "quantized-int4-weight-only"
          # Sortformer currently supports only non-quantized export
          - model:
              repo: "nvidia"
              name: "diar_streaming_sortformer_4spk-v2"
            quant: "quantized-int4-tile-packed"
          - model:
              repo: "nvidia"
              name: "diar_streaming_sortformer_4spk-v2"
            quant: "quantized-int4-weight-only"
          # DINOv2 currently supports only non-quantized export
          - model:
              repo: "facebook"
              name: "dinov2-small-imagenet1k-1-layer"
            quant: "quantized-int4-tile-packed"
          - model:
              repo: "facebook"
              name: "dinov2-small-imagenet1k-1-layer"
            quant: "quantized-int4-weight-only"
          - model:
              repo: "nvidia"
              name: "parakeet-tdt"
            quant: "quantized-int4-weight-only"
          # Whisper: cover all quant types and both sizes with minimal combos
          # whisper-small: non-quantized only
          # whisper-large-v3-turbo: int4-tile-packed + int4-weight-only
          - model:
              repo: "openai"
              name: "whisper-small"
            quant: "quantized-int4-tile-packed"
          - model:
              repo: "openai"
              name: "whisper-small"
            quant: "quantized-int4-weight-only"
          - model:
              repo: "openai"
              name: "whisper-large-v3-turbo"
            quant: "non-quantized"
    with:
      timeout: 90
      runner: ${{ (matrix.model.name == 'Qwen3.5-35B-A3B-HQQ-INT4' || matrix.model.name == 'gemma-4-31B-it-HQQ-INT4') && 'mt-l-x86iavx512-11-125-a100' || 'mt-l-x86aavx2-29-113-a10g' }}
      gpu-arch-type: cuda
      gpu-arch-version: "13.0"
      use-custom-docker-registry: false
      submodules: recursive
      download-artifact: ${{ matrix.model.repo }}-${{ matrix.model.name }}-cuda-${{ matrix.quant }}
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      script: |
        # OSDC runners can't reach the public PyPI CDN that download.pytorch.org's
        # transitive deps resolve to. Pre-install torch's pure-python deps from the
        # in-cluster pypi-cache and drop the default cpu extra-index so the cuda
        # torch wheel is the only candidate.
        export PIP_EXTRA_INDEX_URL=
        pip install filelock typing-extensions "setuptools<82" sympy networkx jinja2 fsspec numpy pillow
        source .ci/scripts/test_model_e2e.sh cuda "${{ matrix.model.repo }}/${{ matrix.model.name }}" "${{ matrix.quant }}" "${RUNNER_ARTIFACT_DIR}"

  test-cuda-pybind:
    name: test-cuda-pybind
    # This job downloads models exported by export-model-cuda-artifact and runs them using pybind.
    # Same gating as test-model-cuda-e2e — explicit success-check on the
    # export job so a skipped export (fork PR, non-sampled push, no path
    # match) auto-skips this job too.
    needs: [changed-files, export-model-cuda-artifact, run-decision]
    if: |
      needs.export-model-cuda-artifact.result == 'success' &&
      (
        contains(needs.changed-files.outputs.changed-files, 'backends/cuda') ||
        contains(needs.changed-files.outputs.changed-files, 'backends/aoti') ||
        contains(needs.changed-files.outputs.changed-files, '.github/workflows/cuda.yml') ||
        contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test-cuda-build.sh') ||
        contains(needs.changed-files.outputs.changed-files, '.ci/scripts/export_model_artifact.sh') ||
        contains(needs.changed-files.outputs.changed-files, '.ci/scripts/test_model_e2e.sh') ||
        needs.run-decision.outputs.is-full-run == 'true'
      )
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: "gemma3-4b"
            quantize: "--quantize"
            artifact: "google-gemma-3-4b-it-cuda-quantized-int4-tile-packed"
          - model: "qwen3-0.6b"
            quantize: ""
            artifact: "Qwen-Qwen3-0.6B-cuda-non-quantized"
          - model: "qwen3-0.6b"
            quantize: "--quantize"
            artifact: "Qwen-Qwen3-0.6B-cuda-quantized-int4-tile-packed"
    with:
      timeout: 120
      secrets-env: EXECUTORCH_HF_TOKEN
      download-artifact: ${{ matrix.artifact }}
      runner: linux.g5.4xlarge.nvidia.gpu
      gpu-arch-type: cuda
      gpu-arch-version: "13.0"
      use-custom-docker-registry: false
      submodules: recursive
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      script: |
        set -eux

        echo "::group::Setup ExecuTorch"
        # Disable MKL to avoid duplicate target error when conda has multiple MKL installations
        export USE_MKL=OFF
        ./install_executorch.sh
        echo "::endgroup::"

        echo "::group::Fix libstdc++ GLIBCXX version"
        # The embedded .so files in the CUDA blob require GLIBCXX_3.4.29
        # which the default conda libstdc++ doesn't have. Install a newer
        # libstdc++ from conda-forge and use it via LD_PRELOAD.
        conda install -y -c conda-forge 'libstdcxx-ng>=12'
        export LD_LIBRARY_PATH=/opt/conda/lib:$LD_LIBRARY_PATH
        # Verify the new libstdc++ has GLIBCXX_3.4.29
        strings /opt/conda/lib/libstdc++.so.6 | grep GLIBCXX_3.4.29 || {
            echo "Error: GLIBCXX_3.4.29 not found in /opt/conda/lib/libstdc++.so.6"
            exit 1
        }
        echo "::endgroup::"

        echo "::group::Setup Huggingface"
        pip install -U "huggingface_hub[cli]>=1.2.1,<2.0"
        HF_AUTH_TOKEN="$(printf '%s' "$SECRET_EXECUTORCH_HF_TOKEN" | tr -d '\r\n')"
        hf auth login --token "$HF_AUTH_TOKEN"
        echo "::endgroup::"

        echo "::group::Install optimum-executorch"
        OPTIMUM_ET_VERSION=$(cat .ci/docker/ci_commit_pins/optimum-executorch.txt)
        pip install "optimum~=2.0.0" "transformers==5.0.0rc1"
        pip install --no-deps git+https://github.com/huggingface/optimum-executorch.git@${OPTIMUM_ET_VERSION}
        echo "::endgroup::"

        echo "::group::Test CUDA Model: ${{ matrix.model }} ${{ matrix.quantize }}"
        python .ci/scripts/test_huggingface_optimum_model.py \
          --model ${{ matrix.model }} \
          --recipe cuda \
          --model_dir "${RUNNER_ARTIFACT_DIR}" \
          --run_only \
          ${{ matrix.quantize }}
        echo "::endgroup::"
