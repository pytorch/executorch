name: Test Backend

on:
  workflow_call:
    inputs:
      backend:
        description: 'Backend to test (xnnpack, coreml, vulkan, qnn)'
        required: true
        type: string
      flows:
        description: 'JSON array of flows to test'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout'
        required: false
        type: string
        default: ${{ github.sha }}
      timeout:
        description: 'Job timeout in minutes'
        required: false
        type: number
        default: 120
      run-linux:
        description: 'Whether to run Linux tests'
        required: false
        type: boolean
        default: false
      run-macos:
        description: 'Whether to run macOS tests'
        required: false
        type: boolean
        default: false
      runner-linux:
        description: 'Runner type for Linux jobs'
        required: false
        type: string
        default: linux.4xlarge.memory

jobs:
  test-backend-linux:
    if: ${{ inputs.run-linux }}
    strategy:
      fail-fast: false
      matrix:
        flow: ${{ fromJSON(inputs.flows) }}
        suite: [models, operators]

    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      ref: ${{ inputs.ref }}
      runner: ${{ inputs.runner-linux }}
      docker-image: ci-image:executorch-ubuntu-22.04-clang12
      submodules: recursive
      timeout: ${{ inputs.timeout }}
      upload-artifact: test-report-${{ matrix.flow }}-${{ matrix.suite }}
      script: |
        set -eux

        source .ci/scripts/test_backend.sh "${{ matrix.suite }}" "${{ matrix.flow }}" "${RUNNER_ARTIFACT_DIR}"

  package-golden-artifacts:
    if: ${{ inputs.run-linux }}
    needs: test-backend-linux
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    with:
      runner: linux.2xlarge
      docker-image: ci-image:executorch-ubuntu-22.04-clang12
      ref: ${{ inputs.ref }}
      timeout: 30
      upload-artifact: golden-artifacts-${{ inputs.backend }}
      script: |
        set -eux

        TIMESTAMP=$(date -u +%y%m%d%H)
        GOLDEN_ZIP="golden_artifacts_${TIMESTAMP}.zip"
        mkdir -p golden_combined

        # Download per-flow model-suite GH artifacts via the GitHub REST API.
        FLOWS='${{ inputs.flows }}'
        for flow in $(echo "$FLOWS" | jq -r '.[]'); do
          ARTIFACT_NAME="test-report-${flow}-models"
          echo "Downloading artifact: ${ARTIFACT_NAME}"

          # Find the artifact download URL
          DOWNLOAD_URL=$(curl -sfL \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts?name=${ARTIFACT_NAME}" \
            | jq -r '.artifacts[0].archive_download_url // empty')

          if [[ -z "$DOWNLOAD_URL" ]]; then
            echo "Artifact ${ARTIFACT_NAME} not found, skipping."
            continue
          fi

          curl -sfL -H "Authorization: token ${GITHUB_TOKEN}" -o artifact.zip "$DOWNLOAD_URL"
          mkdir -p "extracted/${flow}"
          unzip -o artifact.zip -d "extracted/${flow}/"
          rm artifact.zip

          # Collect golden files (pte + bins) into the combined directory.
          find "extracted/${flow}/" -name '*.pte' -o -name '*_input*.bin' -o -name '*_expected_output*.bin' \
            | while read -r f; do
              cp "$f" golden_combined/
            done
        done

        # Create the combined zip if any golden files were produced.
        if ls golden_combined/*.pte 1>/dev/null 2>&1; then
          (cd golden_combined && zip -r "../${GOLDEN_ZIP}" .)
          cp "${GOLDEN_ZIP}" "${RUNNER_ARTIFACT_DIR}/"
          echo "Created ${GOLDEN_ZIP} with $(ls golden_combined/*.pte | wc -l) models."
        else
          echo "No golden artifacts found."
        fi

  test-backend-macos:
    if: ${{ inputs.run-macos }}
    strategy:
      fail-fast: false
      matrix:
        flow: ${{ fromJSON(inputs.flows) }}
        suite: [models, operators]

    uses: pytorch/test-infra/.github/workflows/macos_job.yml@main
    with:
      ref: ${{ inputs.ref }}
      runner: macos-m1-stable
      python-version: "3.12"
      submodules: recursive
      timeout: ${{ inputs.timeout }}
      upload-artifact: test-report-${{ matrix.flow }}-${{ matrix.suite }}
      script: |
        set -eux

        # This is needed to get the prebuilt PyTorch wheel from S3
        ${CONDA_RUN} --no-capture-output pip install awscli==1.37.21

        source .ci/scripts/test_backend.sh "${{ matrix.suite }}" "${{ matrix.flow }}" "${RUNNER_ARTIFACT_DIR}"
