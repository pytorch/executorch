name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude-code:
    uses: pytorch/test-infra/.github/workflows/_claude-code.yml@main
    with:
      setup_script: |
        pip install lintrunner==0.12.7 lintrunner-adapters==0.13.0
        pip install -r requirements-lintrunner.txt
        lintrunner init
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    secrets: inherit
