  test-qnn-python-imports-linux:
    name: test-qnn-python-imports-linux
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
    with:
      runner: linux.2xlarge
      docker-image: ci-image:executorch-ubuntu-22.04-qnn-sdk
      submodules: 'recursive'
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      timeout: 15
      script: |
        CONDA_ENV=$(conda env list --json | jq -r ".envs | .[-1]")
        conda activate "${CONDA_ENV}"

        PYTHON_EXECUTABLE=python bash .ci/scripts/setup-qnn-deps.sh
        PYTHON_EXECUTABLE=python source .ci/scripts/build-qnn-sdk.sh

        CMAKE_ARGS="-DEXECUTORCH_BUILD_QNN=ON -DQNN_SDK_ROOT=$QNN_SDK_ROOT -DEXECUTORCH_BUILD_EXTENSION_TENSOR=ON" \
          PYTHON_EXECUTABLE=python bash .ci/scripts/setup-linux.sh --build-tool cmake --editable true

        pip install -r requirements-examples.txt

        # Source the QNN SDK environment so its bundled Python helpers
        # (e.g. QnnOpPackageGenerator) are importable during the smoke test.
        # envsetup.sh references PYTHONPATH (and friends) directly, which trips
        # the `set -u` inherited from build-qnn-sdk.sh, so relax it for the
        # duration of the source call.
        set +u
        source "${QNN_SDK_ROOT}/bin/envsetup.sh"
        set -u

        # Validate QNN backend Python imports resolve.
        # Catches backend-side Python dependency issues early with a clear error.
        python .ci/scripts/test_backend_imports.py \
          --name QNN \
          --package-root backends/qualcomm \
          --package-prefix executorch.backends.qualcomm

        # Static check that maintained QNN examples still reference valid internal modules.
        python .ci/scripts/test_example_imports.py \
          --name QNN \
          --examples-root examples/qualcomm \
          --module-prefix executorch.examples.qualcomm

