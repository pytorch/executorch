        PYTHON_EXECUTABLE=python bash .ci/scripts/setup-linux.sh --build-tool "${BUILD_TOOL}"

        # Install Node.js and Emscripten
        source .ci/scripts/setup-emscripten.sh

        export PNPM_VERSION=10.24.0

        curl -fsSL https://get.pnpm.io/install.sh | env PNPM_VERSION=$PNPM_VERSION SHELL="$(which bash)" sh -

        export PNPM_HOME="$HOME/.local/share/pnpm"
        export PATH="$PNPM_HOME:$PATH"

        pnpm --version

        # Test selective build
        bash scripts/build_wasm_tests.sh ${{ matrix.enable-etdump }}

        # Install Jest
        cd cmake-out-wasm/extension/wasm/test
        pnpm add -D jest@30.2.0 --ignore-scripts

        # Run unit test
        pnpm test

  unittest-nxp-neutron:
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      runner: linux.2xlarge
      docker-image: ci-image:executorch-ubuntu-22.04-clang12
      submodules: 'recursive'
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      timeout: 90
      script: |
        set -eux

        # The generic Linux job chooses to use base env, not the one setup by the image
        CONDA_ENV=$(conda env list --json | jq -r ".envs | .[-1]")
        conda activate "${CONDA_ENV}"

        # Install eIQ packages
        pip install -r backends/nxp/requirements-eiq.txt

        # Build and install Executorch
        PYTHON_EXECUTABLE=python \
        CMAKE_ARGS="-DEXECUTORCH_BUILD_NXP_NEUTRON=ON -DEXECUTORCH_BUILD_NXP_NEUTRON_RUNNER=ON \
        -DEXECUTORCH_BUILD_KERNELS_PORTABLE=ON -DEXECUTORCH_BUILD_PYBIND=ON -DEXECUTORCH_BUILD_EXTENSION_MODULE=ON \
        -DEXECUTORCH_BUILD_EXTENSION_DATA_LOADER=ON -DEXECUTORCH_BUILD_EXTENSION_FLAT_TENSOR=ON \
        -DEXECUTORCH_BUILD_EXTENSION_TENSOR=ON -DEXECUTORCH_BUILD_EXTENSION_NAMED_DATA_MAP=ON" \
        .ci/scripts/setup-linux.sh --build-tool "cmake"  --editable true

        # Install test requirements
        pip install -r backends/nxp/requirements-tests-pypi.txt
        PYTHON_EXECUTABLE=python bash examples/nxp/setup.sh

        # Run aot examples:
        PYTHON_EXECUTABLE=python bash examples/nxp/run_aot_example.sh cifar10
        PYTHON_EXECUTABLE=python bash examples/nxp/run_aot_example.sh mobilenetv2

        # Run e2e example with Simulator:
        PYTHON_EXECUTABLE=python bash examples/nxp/run.sh cifar10

        # Run unit tests:
        PYTHON_EXECUTABLE=python NXP_RUNNER_PATH="./examples/nxp/executor_runner/build/nxp_executor_runner" \
        bash backends/nxp/run_unittests.sh

  test-samsung-quantmodels-linux:
    name: test-samsung-quantmodels-linux
    # Skip this job if the pull request is from a fork (secrets are not available)
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    secrets: inherit
    with:
      secrets-env: SAMSUNG_AI_LITECORE_KEY
      runner: linux.2xlarge
      docker-image: ci-image:executorch-ubuntu-22.04-clang12-android
      submodules: 'recursive'
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      timeout: 180
      script: |
        set -ex

        # The generic Linux job chooses to use base env, not the one setup by the image
        CONDA_ENV=$(conda env list --json | jq -r ".envs | .[-1]")
        conda activate "${CONDA_ENV}"

        # Setup python
        PYTHON_EXECUTABLE=python bash .ci/scripts/setup-linux.sh --build-tool "cmake"

        # Setup Samsung SDK (AI Lite Core) and install enn backend
        export SAMSUNG_AI_LITECORE_KEY=$SECRET_SAMSUNG_AI_LITECORE_KEY

        trap 'bash .ci/scripts/cleanup-samsung-linux-deps.sh' EXIT TERM INT
        source .ci/scripts/setup-samsung-linux-deps.sh --skip-device-connect

        # Test quant models
        model_scripts="deeplab_v3 edsr inception_v3 inception_v4 mobilenet_v2 mobilenet_v3 resnet18 resnet50 vit wav2letter"
        for m_script in $model_scripts; do
          python -m executorch.examples.samsung.scripts.${m_script} -c e9955 -p A8W8
        done

  test-samsung-models-linux:
    name: test-samsung-models-linux
    # Skip this job if the pull request is from a fork (secrets are not available)
    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    secrets: inherit
    with:
      secrets-env: SAMSUNG_AI_LITECORE_KEY
      runner: linux.2xlarge
      docker-image: ci-image:executorch-ubuntu-22.04-clang12-android
      submodules: 'recursive'
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      timeout: 360
      script: |
        set -ex

        # The generic Linux job chooses to use base env, not the one setup by the image
        CONDA_ENV=$(conda env list --json | jq -r ".envs | .[-1]")
        conda activate "${CONDA_ENV}"

        # Setup python
        PYTHON_EXECUTABLE=python bash .ci/scripts/setup-linux.sh --build-tool "cmake"

        # Setup Samsung SDK (AI Lite Core) and install enn backend
        export SAMSUNG_AI_LITECORE_KEY=$SECRET_SAMSUNG_AI_LITECORE_KEY
        trap 'bash .ci/scripts/cleanup-samsung-linux-deps.sh' EXIT TERM INT
        source .ci/scripts/setup-samsung-linux-deps.sh

        # Check if device was reserved
        if [[ "${DEVICE_ACQUIRED:-0}" != "1" ]]; then
          echo "::warning::Skipping tests - no Samsung device available"
          exit 0
        fi

        # Test models
        python -m unittest discover -s backends/samsung/test/models -p "test_*.py"

  test-vulkan-models-linux:
    name: test-vulkan-models-linux
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      runner: linux.2xlarge
      docker-image: ci-image:executorch-ubuntu-22.04-clang12
      submodules: 'recursive'
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
