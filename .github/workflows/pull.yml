  test-coreml-bc-macos:
    name: test-coreml-bc-macos (${{ matrix.runner }})
    uses: pytorch/test-infra/.github/workflows/macos_job.yml@main
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        runner: [macos-m1-stable, macos-m2-stable]
      fail-fast: false
    with:
      default-packages: ""
      runner: ${{ matrix.runner }}
      submodules: 'recursive'
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      timeout: 180
      script: |
        set -eux

        # Set up Python environment
        eval "$(conda shell.bash hook)"
        conda activate

        echo "::group::Run CoreML Backward Compatibility Test"
        # Copy script to temp location since it will checkout old commits
        # which would overwrite the script itself
        TEMP_SCRIPT=$(mktemp)
        cp .ci/scripts/test_coreml_bc.sh "${TEMP_SCRIPT}"
        bash "${TEMP_SCRIPT}" "$(pwd)"
        rm -f "${TEMP_SCRIPT}"
        echo "::endgroup::"

  nxp-build-test:
    name: nxp-build-test
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      runner: linux.2xlarge
      docker-image: ci-image:executorch-ubuntu-22.04-arm-sdk
      submodules: 'recursive'
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      timeout: 90
      script: |
        # The generic Linux job chooses to use base env, not the one setup by the image
        CONDA_ENV=$(conda env list --json | jq -r ".envs | .[-1]")
        conda activate "${CONDA_ENV}"

        # Build
        cmake -DEXECUTORCH_BUILD_NXP_NEUTRON=ON -Bcmake-out .
        cmake --build cmake-out --target executorch_delegate_neutron --config Release

        # Build check for the neutron backend library
        lib_neutron="cmake-out/backends/nxp/libexecutorch_delegate_neutron.a"
        if [ -f $lib_neutron ]; then
            echo "Neutron backend library built."
        else
            echo "Neutron backend library not found!"
            exit 1
        fi
