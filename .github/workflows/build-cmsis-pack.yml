name: Build CMSIS Pack

on:
  push:
    branches:
      - main
      - release/*
    tags:
      # Release candidate tags
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
      # Release tags
      - v[0-9]+.[0-9]+.[0-9]+
    paths:
      - .github/workflows/build-cmsis-pack.yml
      - backends/arm/cmsis_pack/**
      - backends/arm/runtime/**
      - backends/cortex_m/**
      - kernels/portable/**
      - kernels/quantized/**
      - runtime/**
      - schema/**
  pull_request:
    paths:
      - .github/workflows/build-cmsis-pack.yml
      - backends/arm/cmsis_pack/**
      - backends/arm/scripts/build_cmsis_pack.sh
      - backends/arm/scripts/copy_cmsis_pack_sources.sh
      - backends/arm/scripts/generate_cmsis_pack_components.py
      - backends/arm/scripts/generate_cmsis_pack_register_all_kernels.py
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override pack version (e.g., 1.2.0). Leave empty to derive from version.txt'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

jobs:
  build-cmsis-pack:
    name: build-cmsis-pack
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      runner: linux.2xlarge
      docker-image: ci-image:executorch-ubuntu-22.04-arm-sdk
      submodules: 'recursive'
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      timeout: 60
      upload-artifact: cmsis-pack-artifact
      script: |
        set -eux

        echo "::group::Setup environment"
        # The generic Linux job chooses to use base env, not the one setup by the image
        CONDA_ENV=$(conda env list --json | jq -r ".envs | .[-1]")
        conda activate "${CONDA_ENV}"

        source .ci/scripts/utils.sh
        install_executorch "--use-pt-pinned-commit"
        echo "::endgroup::"

        echo "::group::Install ARM toolchain"
        .ci/scripts/setup-arm-baremetal-tools.sh
        source examples/arm/arm-scratch/setup_path.sh
        echo "::endgroup::"

        echo "::group::Cross-compile ExecuTorch for Cortex-M"
        # Stage 1: Build core ExecuTorch with arm-none-eabi-gcc
        # This generates required headers (flatbuffers, schema)
        backends/arm/scripts/build_executorch.sh
        CMAKE_BUILD_DIR="$(pwd)/cmake-out-arm"
        echo "::endgroup::"

        echo "::group::Determine pack version"
        # Derive version from tag, input override, or version.txt
        if [[ -n "${{ inputs.version_override || '' }}" ]]; then
          PACK_VERSION="${{ inputs.version_override }}"
        elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          # Strip leading 'v' and any -rc suffix for release tags
          PACK_VERSION="${GITHUB_REF#refs/tags/v}"
        else
          # Dev version from version.txt, strip trailing a0
          PACK_VERSION="$(cat version.txt | sed 's/a0$//')-dev"
        fi
        echo "Pack version: ${PACK_VERSION}"
        echo "::endgroup::"++++++++++++++++++++++++++++++++++++++++++++++++++0  

        echo "::group::Build CMSIS Pack"
        backends/arm/scripts/build_cmsis_pack.sh \
          --executorch-root "$(pwd)" \
          --build-dir "${CMAKE_BUILD_DIR}" \
          --version "${PACK_VERSION}" \
          --output-dir "$(pwd)/artifacts-to-be-uploaded"
        echo "::endgroup::"

        echo "::group::Validate pack"
        PACK_FILE=$(ls artifacts-to-be-uploaded/*.pack 2>/dev/null | head -1)
        if [[ -z "${PACK_FILE}" ]]; then
          echo "ERROR: No .pack file found in artifacts"
          exit 1
        fi
        echo "Pack file: ${PACK_FILE}"
        echo "Pack size: $(du -h "${PACK_FILE}" | cut -f1)"

        # Basic validation: check it's a valid zip with expected files
        python3 -c "
        import zipfile, sys
        with zipfile.ZipFile('${PACK_FILE}', 'r') as z:
            names = z.namelist()
            assert any(n.endswith('.pdsc') for n in names), 'No PDSC file found in pack'
            assert any('runtime' in n for n in names), 'No runtime sources found in pack'
            assert any('RegisterAllKernels' in n for n in names), 'No RegisterAllKernels.cpp found'
            print(f'Pack contains {len(names)} files')
            # Print component summary
            pdsc = [n for n in names if n.endswith('.pdsc')][0]
            content = z.read(pdsc).decode()
            op_count = content.count('Csub="Portable')
            q_count = content.count('Csub="Quantized')
            print(f'Portable operator components: {op_count}')
            print(f'Quantized operator components: {q_count}')
        print('Pack validation passed')
        "
        echo "::endgroup::"

  # Publish pack as a release asset when triggered by a release tag
  publish-cmsis-pack:
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc')
    needs: build-cmsis-pack
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download pack artifact
        uses: actions/download-artifact@v4
        with:
          name: cmsis-pack-artifact
          path: pack-output

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pack-output/*.pack
          tag_name: ${{ github.ref_name }}