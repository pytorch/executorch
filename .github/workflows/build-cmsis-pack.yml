name: Build CMSIS Pack

on:
  schedule:
    # Nightly at 03:00 UTC, staggered after nightly.yml (02:00) so the
    # shared runner pool isn't hit by both at the same minute.
    - cron: 0 3 * * *
  push:
    branches:
      - main
      - release/*
    tags:
      # Release candidate tags
      - v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+
      # Release tags
      - v[0-9]+.[0-9]+.[0-9]+
    paths:
      - .github/workflows/build-cmsis-pack.yml
      - backends/arm/cmsis_pack/**
      - backends/arm/scripts/cmsis_pack/**
      - backends/arm/runtime/**
      - backends/cortex_m/**
      - kernels/portable/**
      - kernels/quantized/**
      - runtime/**
      - schema/**
  pull_request:
    paths:
      - .github/workflows/build-cmsis-pack.yml
      - backends/arm/cmsis_pack/**
      - backends/arm/scripts/cmsis_pack/**
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override pack version (e.g., 1.2.0). Leave empty to derive from version.txt'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}-${{ github.event_name == 'workflow_dispatch' }}
  cancel-in-progress: true

jobs:
  build-cmsis-pack:
    name: build-cmsis-pack
    uses: pytorch/test-infra/.github/workflows/linux_job_v2.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      runner: linux.2xlarge
      docker-image: ci-image:executorch-ubuntu-22.04-arm-sdk
      submodules: 'recursive'
      ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      timeout: 60
      upload-artifact: cmsis-pack-artifact
      script: |
        set -eux

        echo "::group::Setup environment"
        # The generic Linux job chooses to use base env, not the one setup by the image
        CONDA_ENV=$(conda env list --json | jq -r ".envs | .[-1]")
        conda activate "${CONDA_ENV}"

        source .ci/scripts/utils.sh
        install_executorch "--use-pt-pinned-commit"
        echo "::endgroup::"

        echo "::group::Install ARM toolchain"
        .ci/scripts/setup-arm-baremetal-tools.sh
        source examples/arm/arm-scratch/setup_path.sh
        echo "::endgroup::"

        echo "::group::Cross-compile ExecuTorch for Cortex-M"
        # Stage 1: Build core ExecuTorch with arm-none-eabi-gcc
        # This generates required headers (flatbuffers, schema)
        backends/arm/scripts/build_executorch.sh
        CMAKE_BUILD_DIR="$(pwd)/cmake-out-arm"
        echo "::endgroup::"

        echo "::group::Determine pack version"
        # Derive version from tag, input override, schedule (nightly), or version.txt
        BASE_VER="$(cat version.txt | sed 's/a0$//')"
        if [[ -n "${{ inputs.version_override || '' }}" ]]; then
          PACK_VERSION="${{ inputs.version_override }}"
        elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
          # Strip leading 'v' and any -rc suffix for release tags
          PACK_VERSION="${GITHUB_REF#refs/tags/v}"
        elif [[ "${{ github.event_name }}" == "schedule" ]]; then
          PACK_VERSION="${BASE_VER}-nightly-$(date -u +%Y%m%d)"
        else
          PACK_VERSION="${BASE_VER}-dev"
        fi
        echo "Pack version: ${PACK_VERSION}"
        echo "::endgroup::"

        echo "::group::Build CMSIS Pack"
        backends/arm/scripts/cmsis_pack/build_pack.sh \
          --executorch-root "$(pwd)" \
          --build-dir "${CMAKE_BUILD_DIR}" \
          --version "${PACK_VERSION}" \
          --output-dir "$(pwd)/artifacts-to-be-uploaded"
        echo "::endgroup::"

        echo "::group::Validate pack"
        PACK_FILE=$(ls artifacts-to-be-uploaded/*.pack 2>/dev/null | head -1)
        if [[ -z "${PACK_FILE}" ]]; then
          echo "ERROR: No .pack file found in artifacts"
          exit 1
        fi
        echo "Pack file: ${PACK_FILE}"
        echo "Pack size: $(du -h "${PACK_FILE}" | cut -f1)"

        python3 - <<PYEOF
        import sys, zipfile, xml.etree.ElementTree as ET
        pack_file = "${PACK_FILE}"
        with zipfile.ZipFile(pack_file, 'r') as z:
            names = z.namelist()
            names_set = set(names)

            # Presence
            pdsc_names = [n for n in names if n.endswith('.pdsc')]
            assert pdsc_names, 'No PDSC file found in pack'
            assert any('runtime' in n for n in names), 'No runtime sources found in pack'
            assert any('RegisterAllKernels' in n for n in names), 'No RegisterAllKernels.cpp found'

            # No duplicates
            if len(names) != len(names_set):
                dupes = sorted({n for n in names if names.count(n) > 1})
                print(f'ERROR: duplicate entries in pack: {dupes[:5]}')
                sys.exit(1)

            # No Python source leaked in
            py = [n for n in names if n.endswith('.py')]
            assert not py, f'Python files leaked into pack: {py[:5]}'

            # PDSC must be well-formed XML
            pdsc = pdsc_names[0]
            content = z.read(pdsc).decode()
            try:
                root = ET.fromstring(content)
            except ET.ParseError as e:
                print(f'ERROR: PDSC is not well-formed XML: {e}')
                sys.exit(1)

            # Every <file name="..."/> in the PDSC must resolve to something
            # present in the archive (either an exact entry or a directory
            # prefix covering one or more entries).
            def exists(ref):
                if ref in names_set:
                    return True
                prefix = ref if ref.endswith('/') else ref + '/'
                return any(n.startswith(prefix) for n in names)

            missing = [f.attrib['name'] for f in root.iter('file')
                       if 'name' in f.attrib and not exists(f.attrib['name'])]
            if missing:
                print(f'ERROR: {len(missing)} PDSC file refs missing from archive')
                for m in missing[:10]:
                    print(f'  {m}')
                sys.exit(1)

            size_kb = sum(i.file_size for i in z.infolist()) / 1024
            op_count = content.count('Csub="Portable')
            q_count = content.count('Csub="Quantized')
            print(f'Pack: {len(names)} files, {size_kb:.0f} KiB uncompressed')
            print(f'Portable operator components: {op_count}')
            print(f'Quantized operator components: {q_count}')
        print('Pack validation passed')
        PYEOF
        echo "::endgroup::"

        echo "::group::Regression: consume pack with arm-none-eabi toolchain"
        # Extract the pack to a clean directory and smoke-build against it
        # using the same Cortex-M toolchain the pack is meant to target. This
        # catches pack layout / header graph / operator source regressions
        # without depending on the in-tree ExecuTorch source layout.
        EXTRACT_DIR="$(pwd)/pack-extracted"
        rm -rf "${EXTRACT_DIR}"
        mkdir -p "${EXTRACT_DIR}"
        unzip -q "${PACK_FILE}" -d "${EXTRACT_DIR}"

        SMOKE_SRC="$(pwd)/pack_smoke.cpp"
        cat > "${SMOKE_SRC}" <<'CPPEOF'
        #include <executorch/runtime/core/error.h>
        #include <executorch/runtime/core/result.h>
        #include <executorch/runtime/core/exec_aten/exec_aten.h>
        #include <executorch/runtime/executor/method.h>
        #include <executorch/runtime/executor/program.h>
        #include <executorch/runtime/platform/runtime.h>
        int main() { return 0; }
        CPPEOF

        ARM_CXXFLAGS=(
          -mcpu=cortex-m55 -mthumb
          -std=gnu++17
          -fno-exceptions -fno-rtti
          -ffreestanding
          -Wall
        )

        echo "-- Compile test: pack public headers"
        arm-none-eabi-g++ "${ARM_CXXFLAGS[@]}" \
          -I "${EXTRACT_DIR}/include" \
          -c "${SMOKE_SRC}" -o /tmp/pack_smoke.o

        echo "-- Compile test: pack operator source (kernels/portable/op_add.cpp)"
        # op_* files live under src/kernels/portable; the pack lays sources
        # out as src/... and headers as include/... so add both as include
        # roots (operator .cpp files may include sibling headers from src/).
        arm-none-eabi-g++ "${ARM_CXXFLAGS[@]}" \
          -I "${EXTRACT_DIR}/include" \
          -I "${EXTRACT_DIR}/src" \
          -c "${EXTRACT_DIR}/src/kernels/portable/op_add.cpp" \
          -o /tmp/pack_op_add.o

        echo "Pack consumption smoke test passed"
        echo "::endgroup::"

  # Publish pack as a release asset when triggered by a release tag
  publish-cmsis-pack:
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc')
    needs: build-cmsis-pack
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download pack artifact
        uses: actions/download-artifact@v4
        with:
          name: cmsis-pack-artifact
          path: pack-output

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pack-output/*.pack
          tag_name: ${{ github.ref_name }}