# Arduino Uno Q — STM32U585 (Cortex-M33, DSP, no MVE, no Ethos-U)
# 2 MB flash, 786 KB SRAM — plenty of room for DS-CNN int8 (50 KB .pte).
#
# CMSIS-NN uses the DSP path for M33 (no MVE on U5 series).

# Memory tuning for DS-CNN on STM32U585:
#   - method allocator: 64 KB (DS-CNN metadata + planned buffers)
#   - main stack:       8 KB
#   - heap:            16 KB
#
# Scratch buffers for CMSIS-NN kernels are planned AoT (see
# backends/cortex_m/passes/scratch_buffer_sizes.py), so no temp
# allocator pool is needed.
CONFIG_EXECUTORCH_METHOD_ALLOCATOR_POOL_SIZE=65536
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=16384
