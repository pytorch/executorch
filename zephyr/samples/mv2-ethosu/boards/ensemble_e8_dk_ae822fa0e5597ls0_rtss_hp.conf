# Keep the linked image address in sync with the Alif ATOC mramAddress used by
# this sample's generated zephyr.json.
CONFIG_FLASH_LOAD_OFFSET=0x8000

# Enable the Zephyr Ethos-U driver so the ExecuTorch Arm backend is built and
# the EthosUBackend delegate is registered at runtime.
CONFIG_ETHOS_U=y
CONFIG_ETHOS_U55_256=y

# Alif MRAM is DMA-accessible by the NPU, so avoid duplicating the model into
# SRAM at startup.
CONFIG_ET_ARM_MODEL_PTE_DMA_ACCESSIBLE=y
