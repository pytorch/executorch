# NVIDIA double-buffered coopmat GEMM reference (shmem_double_buf4) ported to
# the ET shader system. Geometry matches the reference's standalone harness:
# one workgroup = one 128x128 output tile, K-step 16, 8 subgroups x 32 threads.

coopmat_mm_ref:
  parameter_names_with_default_values:
    MMA_M: 16
    MMA_N: 16
    MMA_K: 16
    TILE_M: 128
    TILE_N: 128
    TILE_K: 16
    SG_GRID_X: 4
    SG_GRID_Y: 2
    SUBGROUP_SIZE: 32
  shader_variants:
    - NAME: coopmat_mm_ref_half
