softmax_buffer:
  parameter_names_with_default_values:
    OPERATOR1: exp(X)
    OPERATOR2: X / Y
    DTYPE: float
    STORAGE: buffer
  generate_variant_forall:
    DTYPE:
      - VALUE: half
      - VALUE: float
  shader_variants:
    - NAME: softmax_buffer
    - NAME: log_softmax_buffer
      OPERATOR1: X
      OPERATOR2: X - log(Y)
