binary_op_buffer:
  parameter_names_with_default_values:
    OPERATOR: X + A * Y
    NDIM: 3
    DTYPE: float
    PACKING: C_packed
    STORAGE: buffer
  generate_variant_forall:
    DTYPE:
      - VALUE: half
      - VALUE: float
      - VALUE: int32
  shader_variants:
    - NAME: binary_add_buffer
    - NAME: binary_sub_buffer
      OPERATOR: X - A * Y
    - NAME: binary_mul_buffer
      OPERATOR: X * Y
    - NAME: binary_div_buffer
      OPERATOR: X / Y
    - NAME: binary_pow_buffer
      OPERATOR: pow(float(X), float(Y))
    - NAME: binary_floor_divide_buffer
      OPERATOR: floor(X / Y)
    - NAME: binary_minimum_buffer
      OPERATOR: min(X, Y)
    - NAME: binary_eq_int32_buffer
      OPERATOR: X == Y
      DTYPE: int32
    - NAME: binary_eq_buffer
      OPERATOR: abs(X - Y) < 1e-5
      generate_variant_forall:
        DTYPE:
          - VALUE: half
          - VALUE: float
    - NAME: binary_lt_buffer
      OPERATOR: X < Y
    - NAME: binary_le_buffer
      OPERATOR: X <= Y
    - NAME: binary_gt_buffer
      OPERATOR: X > Y
    - NAME: binary_ge_buffer
      OPERATOR: X >= Y
    - NAME: binary_bitwise_and_buffer
      OPERATOR: X & Y
      generate_variant_forall:
        DTYPE:
          - VALUE: uint8
