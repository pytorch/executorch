binary_scalar_texture:
  parameter_names_with_default_values:
    OPERATOR: power_of(X, Y)
    IS_COMPARISON_OP: false
    DTYPE: float
    STORAGE: texture3d
  generate_variant_forall:
    DTYPE:
      - VALUE: half
      - VALUE: float
      - VALUE: int32
  shader_variants:
    - NAME: pow_scalar_texture3d
    - NAME: eq_scalar_texture3d
      OPERATOR: equal(X, Y)
      IS_COMPARISON_OP: true
