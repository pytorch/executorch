linear_scalar:
  parameter_names_with_default_values:
    DTYPE: float
    STORAGE: buffer
    WEIGHT_STORAGE: texture2d
    HAS_BIAS: false
    TILE_M4: 1
    TILE_K4: 1
    TILE_N4: 1
    TILE_M: 4
  generate_variant_forall:
    combination:
      parameter_names: [STORAGE, WEIGHT_STORAGE]
      combos:
        - parameter_values: [buffer, texture2d]
        - parameter_values: [buffer, buffer]
    DTYPE:
      - VALUE: float
      - VALUE: half
  shader_variants:
    - NAME: linear
    - NAME: linear_tile_row_2
      TILE_M: 2
    - NAME: linear_tile_row_1
      TILE_M: 1
    - NAME: linear_bias
      HAS_BIAS: true
    - NAME: linear_bias_tile_row_2
      HAS_BIAS: true
      TILE_M: 2
    - NAME: linear_bias_tile_row_1
      HAS_BIAS: true
      TILE_M: 1
