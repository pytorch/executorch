binary_op_texture:
  parameter_names_with_default_values:
    OPERATOR: X + A * Y
    NDIM: 3
    DTYPE: float
    PACKING: C_packed
    MASK_PADDING: 0
  generate_variant_forall:
    DTYPE:
      - VALUE: half
      - VALUE: float
      - VALUE: int32
  shader_variants:
    - NAME: binary_add_texture3d
    - NAME: binary_sub_texture3d
      OPERATOR: X - A * Y
    - NAME: binary_mul_texture3d
      OPERATOR: X * Y
    - NAME: binary_div_texture3d
      OPERATOR: X / Y
      MASK_PADDING: 1
    - NAME: binary_pow_texture3d
      OPERATOR: pow(X, Y)
    - NAME: binary_floor_divide_texture3d
      OPERATOR: floor(X / Y)
      MASK_PADDING: 1
    - NAME: binary_minimum_texture3d
      OPERATOR: min(X, Y)
    - NAME: binary_eq_int32_texture3d
      OPERATOR: equal(X, Y)
      DTYPE: int32
    - NAME: binary_eq_texture3d
      OPERATOR: lessThan(abs(X - Y), VEC4_T(1e-5))
      generate_variant_forall:
        DTYPE:
          - VALUE: half
          - VALUE: float
    - NAME: binary_lt_texture3d
      OPERATOR: lessThan(X, Y)
    - NAME: binary_le_texture3d
      OPERATOR: lessThanEqual(X, Y)
    - NAME: binary_gt_texture3d
      OPERATOR: greaterThan(X, Y)
    - NAME: binary_ge_texture3d
      OPERATOR: greaterThanEqual(X, Y)
    - NAME: binary_bitwise_and_texture3d
      OPERATOR: X & Y
      generate_variant_forall:
        DTYPE:
          - VALUE: uint8
