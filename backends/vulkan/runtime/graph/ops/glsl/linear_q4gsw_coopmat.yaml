# coopmat variant of linear_q4gsw_tiled (fp16 act x INT4 weight).
# Forces buffer storage for activation/output (coopMatLoad/Store on buffers);
# INT4 weight storage can be texture2d or buffer (matches the tiled path).
# DTYPE = half only; fp32 activations are not supported.
# Geometry follows the double-buffered reference (gemm_double_buf): 128x128
# tile, K-step 16, 8 subgroups x 32 threads (subgroup size 32 forced).

linear_q4gsw_coopmat:
  parameter_names_with_default_values:
    PRECISION: highp
    HAS_BIAS: false
    WEIGHT_STORAGE: texture2d
    MMA_M: 16
    MMA_N: 16
    MMA_K: 16
    WG_TILE_M: 128
    WG_TILE_N: 128
    WG_TILE_K: 16
    SG_GRID_X: 4
    SG_GRID_Y: 2
    SUBGROUP_SIZE: 32
  shader_variants:
    - NAME: linear_q4gsw_coopmat_buffer_texture2d_half
      WEIGHT_STORAGE: texture2d
    - NAME: linear_q4gsw_coopmat_buffer_buffer_half
      WEIGHT_STORAGE: buffer
